<!-- popup.html -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />

  <title>CipherGap</title>
</head>

<body>

  <div class="container">

    <div class="header">

      <div class="logo">
        🔐
      </div>

      <div>
        <div class="title">
          CipherGap
        </div>

        <div class="subtitle">
          End-to-End Encryption
        </div>
      </div>

    </div>

    <div class="site-card">

      <div class="label">
        Current Website
      </div>

      <div id="siteName" class="site-name">
        Loading...
      </div>

    </div>

    <div id="emptyState" class="empty-state">

      <div class="empty-icon">
        ⚠️
      </div>

      <div class="empty-title">
        No key configured
      </div>

      <div class="empty-text">
        Please set a secret key for this website.
      </div>

    </div>

    <div id="savedState" class="saved-state hidden">

      <div class="saved-header">
        <span>
          Current Key
        </span>

        <span class="status-badge">
          ACTIVE
        </span>
      </div>

      <div id="savedKey" class="saved-key">
        ********
      </div>

    </div>

    <div class="form-section">

      <label class="input-label">
        Secret Key
      </label>

      <input
        id="secretKey"
        class="textbox"
        type="password"
        placeholder="Enter your secret key"
      />

      <button id="saveBtn" class="save-btn">
        Save Key
      </button>

    </div>

    <div id="status" class="status"></div>
    <div>
        <span> Made By ❤️ and lots of ☕ by</span>
        <a href="https://ali-sharify.ir" target="_blank" rel="noopener noreferrer" style="color: #000000; text-decoration: none; border-bottom: 1px dashed #ffbc6e; transition: 0.2s; display: inline-flex; align-items: center; gap: 4px;">
            Ali Sharify
        </a>

    </div>

  </div>

  <script src="popup.js"></script>

</body>

</html>
